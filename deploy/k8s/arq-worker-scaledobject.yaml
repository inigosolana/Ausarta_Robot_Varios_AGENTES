# KEDA escala workers ARQ según profundidad de cola Redis `arq:queue`.
# ARQ almacena la cola como sorted set; el scaler redis de KEDA usa ZCARD automáticamente.
#
# Regla: ~50 jobs por pod → >50 en cola con 1 pod dispara réplica adicional (hasta 20).
# Cola vacía: minReplicaCount=1 mantiene un worker base para campañas/cron.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: arq-worker-scaler
  namespace: ausarta-voice
  labels:
    app.kubernetes.io/name: arq-worker
    app.kubernetes.io/component: keda
spec:
  scaleTargetRef:
    name: arq-worker
  pollingInterval: 15
  cooldownPeriod: 60
  minReplicaCount: 1
  maxReplicaCount: 20
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Pods
              value: 4
              periodSeconds: 30
            - type: Percent
              value: 100
              periodSeconds: 30
          selectPolicy: Max
  triggers:
    - type: redis
      metadata:
        hostFromEnv: REDIS_HOST
        portFromEnv: REDIS_PORT
        databaseIndexFromEnv: REDIS_DATABASE_INDEX
        listName: arq:queue
        listLength: "50"
        activationListLength: "1"
      authenticationRef:
        name: keda-redis-auth
