apiVersion: v1
kind: ConfigMap
metadata:
  name: arq-worker-config
  namespace: ausarta-voice
  labels:
    app.kubernetes.io/name: arq-worker
    app.kubernetes.io/component: campaign-worker
data:
  # Cola ARQ por defecto (arq.constants.default_queue_name)
  ARQ_QUEUE_NAME: "arq:queue"
  PYTHONUNBUFFERED: "1"
  BRIDGE_SERVER_URL: "http://ausarta-backend:8001"
  BRIDGE_SERVER_URL_INTERNAL: "http://ausarta-backend:8001"
  # Ajustar al Service DNS del backend en el cluster
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DATABASE_INDEX: "0"
