# Plantilla — NO aplicar con valores reales en git.
# Crear el Secret en el cluster antes del Deployment:
#
#   kubectl -n ausarta-voice create secret generic ausarta-backend-secrets \
#     --from-literal=REDIS_PASSWORD='...' \
#     --from-literal=REDIS_URL='redis://:PASSWORD@redis:6379/0' \
#     --from-literal=SUPABASE_URL='...' \
#     --from-literal=SUPABASE_KEY='...' \
#     --from-literal=SUPABASE_SERVICE_ROLE_KEY='...' \
#     --from-literal=ENCRYPTION_KEY='...' \
#     --from-literal=LIVEKIT_URL='...' \
#     --from-literal=LIVEKIT_API_KEY='...' \
#     --from-literal=LIVEKIT_API_SECRET='...' \
#     --from-literal=DEEPGRAM_API_KEY='...' \
#     --from-literal=CARTESIA_API_KEY='...' \
#     --from-literal=GROQ_API_KEY='...' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
apiVersion: v1
kind: Secret
metadata:
  name: ausarta-backend-secrets
  namespace: ausarta-voice
  labels:
    app.kubernetes.io/name: arq-worker
type: Opaque
stringData:
  REDIS_PASSWORD: "REPLACE_ME"
  REDIS_URL: "redis://:REPLACE_ME@redis:6379/0"
