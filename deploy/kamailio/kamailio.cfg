#!KAMAILIO
#
# Kamailio SIP Edge Proxy — Ausarta / LiveKit (multi-región)
# - Escucha: 5060 (UDP/TCP), 5061 (TLS)
# - Whitelist carriers (ipops trusted) + rate limit INVITE
# - Balanceo ponderado hacia nodos LiveKit Edge (Madrid / Latam)
# - Failover automático si el trunk LiveKit principal no responde
#
# Despliegue: trusted_peers.list + region_peers.list + entrypoint.sh

####### Definiciones globales #########

#!define SIP_DOMAIN sip.ausarta.net
#!define LIVEKIT_DISPATCHER_SET 1
#!define FLT_DLG 1
#!define INVITE_RATE_MAX 5

debug=2
log_stderror=yes
memdbg=5
memlog=5
log_facility=LOG_LOCAL0
children=4
auto_aliases=no
tcp_connection_lifetime=3605
tcp_max_connections=2048
tcp_accept_no_cl=yes
tcp_rd_buf_size=16384

alias=SIP_DOMAIN

listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
listen=tls:0.0.0.0:5061

enable_tls=yes
tls_certificate_file=/etc/kamailio/tls/cert.pem
tls_private_key_file=/etc/kamailio/tls/key.pem

####### Módulos #########

mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules/"

loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "corex.so"
loadmodule "kex.so"

loadmodule "tls.so"
loadmodule "tcp.so"
loadmodule "ipops.so"

loadmodule "dispatcher.so"
loadmodule "pike.so"
loadmodule "htable.so"
loadmodule "dialog.so"

####### Parámetros de módulos #########

modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)
modparam("tm", "restart_fr_on_each_reply", 1)

modparam("rr", "append_fromtag", 1)
modparam("rr", "enable_full_lr", 1)

modparam("maxfwd", "max_limit", 10)

modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "flags", 2)
modparam("dispatcher", "xavp_dst", "_dsdst_")
modparam("dispatcher", "ds_ping_interval", 30)
modparam("dispatcher", "ds_probing_mode", 1)
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_ping_from", "sip:dispatcher@SIP_DOMAIN")
modparam("dispatcher", "ds_probing_threshold", 2)
modparam("dispatcher", "ds_inactive_threshold", 2)
modparam("dispatcher", "ds_reply_codes", "408,500,501,502,503,504")

/* Anti-flood general */
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "req_timeout_window", 10)
modparam("pike", "req_allowed_density", 15)

modparam("htable", "htable", "regflood=>size=8;autoexpire=60;")
modparam("htable", "htable", "ipban=>size=16;autoexpire=3600;")
modparam("htable", "htable", "invite_rate=>size=16;autoexpire=60;")
modparam("htable", "htable", "invite_ban=>size=16;autoexpire=3600;")

modparam("dialog", "dlg_flag", FLT_DLG)
modparam("dialog", "default_timeout", 21600)

####### Rutas #########

request_route {
    route(REQINIT);

    if (has_totag()) {
        if (loose_route()) {
            route(RELAY);
            exit;
        }
    }

    if (is_method("REGISTER")) {
        route(REGISTER);
        exit;
    }

    if (is_method("OPTIONS") && uri==myself) {
        route(TRUSTED_SOURCE);
        sl_send_reply("200", "OK");
        exit;
    }

    /* Solo métodos de señalización de llamada — bloquear SUBSCRIBE/MESSAGE/REFER */
    if (is_method("INVITE|ACK|BYE|CANCEL|UPDATE|PRACK|INFO")) {
        route(TRUSTED_SOURCE);
        route(INVITE_RATE_LIMIT);
        route(LIVEKIT_DISPATCH);
        exit;
    }

    xlog("L_WARN", "Blocked SIP method $rm from $si:$sp\n");
    sl_send_reply("405", "Method Not Allowed");
    exit;
}

route[REQINIT] {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP from $si:$sp\n");
        exit;
    }

    if ($sht(ipban=>$si) != $null) {
        xlog("L_WARN", "Blocked banned IP $si\n");
        exit;
    }

    if ($sht(invite_ban=>$si) != $null) {
        xlog("L_WARN", "Blocked invite_ban IP $si\n");
        sl_send_reply("503", "Service Unavailable");
        exit;
    }

    if (!pike_check_req()) {
        $sht(ipban=>$si) = 1;
        exit;
    }
}

route[TRUSTED_SOURCE] {
    if (ipops.match_source("$si", "trusted")) {
        return;
    }
    xlog("L_WARN", "SIP DENY untrusted src=$si:$sp rm=$rm\n");
    sl_send_reply("403", "Forbidden - Untrusted Source");
    exit;
}

route[INVITE_RATE_LIMIT] {
    if (!is_method("INVITE")) {
        return;
    }

    $var(cnt) = $sht(invite_rate=>$si);
    if ($var(cnt) == $null) {
        $var(cnt) = 0;
    }
    if ($var(cnt) >= INVITE_RATE_MAX) {
        xlog("L_WARN", "INVITE rate limit exceeded $si:$sp count=$var(cnt)\n");
        $sht(invite_ban=>$si) = 1;
        sl_send_reply("503", "Too Many Invites");
        exit;
    }
    $sht(invite_rate=>$si) = $var(cnt) + 1;
}

route[REGISTER] {
    $var(cnt) = $sht(regflood=>$si);
    if ($var(cnt) == $null) {
        $var(cnt) = 0;
    }
    if ($var(cnt) >= 10) {
        xlog("L_WARN", "REGISTER flood from $si:$sp (count=$var(cnt))\n");
        sl_send_reply("403", "Forbidden - Too Many Registrations");
        exit;
    }
    $sht(regflood=>$si) = $var(cnt) + 1;

    if (!pike_check_req()) {
        $sht(ipban=>$si) = 1;
        sl_send_reply("403", "Forbidden");
        exit;
    }

    sl_send_reply("403", "Registration Not Supported At Edge");
    exit;
}

route[LIVEKIT_REGION] {
    /* Por defecto EU (Edge-Madrid). Carriers Latam → edge-latam. */
    $var(region) = "eu";
    if (ipops.match_source("$si", "carrier_latam")) {
        $var(region) = "latam";
    }
    return;
}

route[LIVEKIT_DISPATCH] {
    route(LIVEKIT_REGION);

    /* 1) Nodo regional preferido (peso + probing activo) */
    if (!ds_select_dst("1", "4", "region", "$var(region)")) {
        /* 2) Failover: cualquier nodo activo del set (otra región o backup) */
        if (!ds_select_dst("1", "4")) {
            xlog("L_ERR", "No LiveKit destination available (set 1, region=$var(region))\n");
            sl_send_reply("503", "Service Unavailable");
            exit;
        }
        xlog("L_WARN", "Regional LiveKit unavailable (region=$var(region)) → failover $du\n");
    }

    xlog("L_INFO", "Dispatch $rm → $du (region=$var(region), src $si:$sp)\n");

    if (is_method("INVITE")) {
        setflag(FLT_DLG);
        t_on_failure("LIVEKIT_FAILOVER");
    }

    route(RELAY);
    exit;
}

route[LIVEKIT_FAILOVER] {
    if (t_is_canceled()) {
        exit;
    }

    /* Trunk caído, timeout o 5xx → marcar destino y probar siguiente */
    if (!(t_check_status("408") || t_check_status("5[0-9][0-9]") || t_check_status("503"))) {
        exit;
    }

    ds_mark_dst("p");

    if (ds_next_dst()) {
        xlog("L_WARN", "LiveKit branch failover → $du (reply $T_reply_code, region=$var(region))\n");
        t_on_failure("LIVEKIT_FAILOVER");
        route(RELAY);
        exit;
    }

    xlog("L_ERR", "LiveKit failover exhausted (reply $T_reply_code)\n");
}

failure_route[LIVEKIT_FAILOVER] {
    route(LIVEKIT_FAILOVER);
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

onreply_route {
    if (has_body("application/sdp")) {
        ;
    }
}

event_route[tm:branch-failure] {
    xlog("L_WARN", "Branch failure $T_reply_code dst=$du\n");
}
