# Kamailio SIP Edge Proxy — Easypanel (Docker Compose desde la raíz del repo)
# Puertos: 5060 UDP/TCP, 5061 TLS → balanceo multi-región LiveKit (dispatcher)
#
# Easypanel: usar este compose con working directory = raíz del proyecto.
# Variables en la UI de entorno (o .env en la raíz):
#   SIP_DOMAIN                  — dominio SIP (ej. sip.tudominio.com)
#   EXTERNAL_SIP_IP             — IP pública del nodo (opcional, SDP/RTP)
#   LIVEKIT_EDGE_MADRID_HOST    — hostname/IP nodo LiveKit Edge EU
#   LIVEKIT_EDGE_LATAM_HOST     — hostname/IP nodo LiveKit Edge Latam
#   LIVEKIT_EDGE_MADRID_BACKUP_HOST — backup EU (opcional)
#   SIP_LATAM_CIDRS             — CIDRs carriers Latam (coma-separado)

services:
  kamailio-edge:
    image: kamailio/kamailio:5.8-bookworm
    container_name: kamailio-sip-edge
    hostname: kamailio-edge
    restart: unless-stopped

    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5061:5061/tcp"

    volumes:
      - ./deploy/kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
      - ./deploy/kamailio/dispatcher.list:/etc/kamailio/dispatcher.list.example:ro
      - ./deploy/kamailio/trusted_peers.list:/etc/kamailio/trusted_peers.list:ro
      - ./deploy/kamailio/region_peers.list:/etc/kamailio/region_peers.list:ro
      - ./deploy/kamailio/entrypoint.sh:/etc/kamailio/entrypoint.sh:ro
      - ./deploy/kamailio/render_dispatcher.sh:/etc/kamailio/render_dispatcher.sh:ro
      - ./deploy/kamailio/certs:/etc/kamailio/tls:ro

    env_file:
      - .env

    environment:
      SIP_DOMAIN: ${SIP_DOMAIN}
      EXTERNAL_SIP_IP: ${EXTERNAL_SIP_IP}
      SIP_TRUSTED_CIDRS: ${SIP_TRUSTED_CIDRS:-}
      SIP_LATAM_CIDRS: ${SIP_LATAM_CIDRS:-}
      LIVEKIT_EDGE_MADRID_HOST: ${LIVEKIT_EDGE_MADRID_HOST:-}
      LIVEKIT_EDGE_LATAM_HOST: ${LIVEKIT_EDGE_LATAM_HOST:-}
      LIVEKIT_EDGE_MADRID_BACKUP_HOST: ${LIVEKIT_EDGE_MADRID_BACKUP_HOST:-}
      LIVEKIT_EDGE_MADRID_PORT: ${LIVEKIT_EDGE_MADRID_PORT:-5060}
      LIVEKIT_EDGE_LATAM_PORT: ${LIVEKIT_EDGE_LATAM_PORT:-5060}
      LIVEKIT_EDGE_MADRID_BACKUP_PORT: ${LIVEKIT_EDGE_MADRID_BACKUP_PORT:-5060}
      LIVEKIT_EDGE_MADRID_WEIGHT: ${LIVEKIT_EDGE_MADRID_WEIGHT:-80}
      LIVEKIT_EDGE_LATAM_WEIGHT: ${LIVEKIT_EDGE_LATAM_WEIGHT:-70}
      LIVEKIT_EDGE_MADRID_BACKUP_WEIGHT: ${LIVEKIT_EDGE_MADRID_BACKUP_WEIGHT:-40}

    entrypoint: ["/bin/sh", "/etc/kamailio/entrypoint.sh"]

    command: []

    healthcheck:
      test: ["CMD-SHELL", "kamcmd core.ping 2>/dev/null | grep -q pong || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

    networks:
      - kamailio-edge-net

networks:
  kamailio-edge-net:
    driver: bridge
