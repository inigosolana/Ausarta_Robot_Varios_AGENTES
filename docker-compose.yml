version: '3.8'

services:
  # El backend necesita SUPABASE_JWT_SECRET en el entorno del contenedor (validación Bearer).
  # En Portainer: variables del stack + línea inferior; tras cambiar variables → Pull/Redeploy.
  # Si el secreto empieza por +, en YAML del stack puedes entrecomillar el valor.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ausarta-v2-backend
    restart: unless-stopped
    ports:
      - "8003:8001"
    env_file:
      - .env
    environment:
      # REDIS_URL se construye aquí porque requiere composición con REDIS_PASSWORD.
      # El operador ?Error hace que Docker falle si REDIS_PASSWORD está vacía o no definida en .env.
      - REDIS_URL=redis://:${REDIS_PASSWORD?REDIS_PASSWORD obligatoria - defínela en .env}@redis:6379/0
      # Estos valores requieren interpolación cruzada de otras variables, no se pueden declarar como literales en .env
      - IMPERSONATION_SECRET=${IMPERSONATION_SECRET:-${SUPABASE_SERVICE_ROLE_KEY}}
      - BRIDGE_SERVER_URL=${BRIDGE_SERVER_URL:-http://localhost:8001}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    networks:
      - ausarta-network
    volumes:
      # NOTA: Este volumen SQLite es exclusivo de entornos locales/desarrollo o como fallback temporal.
      # La base de datos principal en PRODUCCIÓN es Supabase (PostgreSQL).
      # En producción, este mount puede eliminarse si el código no lo referencia.
      - sqlite-data:/app/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  arq-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ausarta-arq-worker
    restart: unless-stopped
    command: ["arq", "worker.WorkerSettings"]
    working_dir: /app
    env_file:
      - .env
    environment:
      # Misma lógica que en backend: REDIS_URL requiere composición y protección estricta.
      - REDIS_URL=redis://:${REDIS_PASSWORD?REDIS_PASSWORD obligatoria - defínela en .env}@redis:6379/0
      - PYTHONUNBUFFERED=1
      # El worker siempre comunica con el backend por red interna de Docker, no por host.
      - BRIDGE_SERVER_URL=http://backend:8001
      - BRIDGE_SERVER_URL_INTERNAL=http://backend:8001
      - IMPERSONATION_SECRET=${IMPERSONATION_SECRET:-${SUPABASE_SERVICE_ROLE_KEY}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    networks:
      - ausarta-network

  redis:
    image: redis:alpine
    container_name: ausarta-redis
    restart: unless-stopped
    networks:
      - ausarta-network
    # Prevención estricta: si REDIS_PASSWORD no existe o está vacía en .env,
    # Docker Compose fallará al resolver la variable y no arrancará el contenedor.
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD?REDIS_PASSWORD obligatoria - defínela en .env}
    volumes:
      - redis-data:/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-${SUPABASE_URL}}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-${SUPABASE_KEY}}
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: ausarta-v2-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - ausarta-network
    depends_on:
      - backend
      - redis
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ausarta-network:
    driver: bridge

volumes:
  # SQLite: solo desarrollo local / fallback. BD principal en producción: Supabase (PostgreSQL).
  sqlite-data:
    driver: local
  redis-data:
    driver: local
