version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ausarta-v2-backend
    restart: unless-stopped
    ports:
      - "8003:8001"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD?REDIS_PASSWORD obligatoria - defínela en .env}@redis:6379/0
      - IMPERSONATION_SECRET=${IMPERSONATION_SECRET:-${SUPABASE_SERVICE_ROLE_KEY}}
      - BRIDGE_SERVER_URL=${BRIDGE_SERVER_URL:-http://localhost:8001}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    networks:
      - ausarta-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  livekit-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ausarta-livekit-agent
    restart: unless-stopped
    command: ["/agent_start.sh"]
    working_dir: /app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - BRIDGE_SERVER_URL=http://backend:8001
      - BRIDGE_SERVER_URL_INTERNAL=http://backend:8001
    depends_on:
      backend:
        condition: service_healthy
      # FIX 7: esperar a que Redis esté realmente disponible (no sólo iniciado)
      redis:
        condition: service_healthy
    networks:
      - ausarta-network

  arq-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ausarta-arq-worker
    restart: unless-stopped
    command: ["arq", "worker.WorkerSettings"]
    working_dir: /app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD?REDIS_PASSWORD obligatoria - defínela en .env}@redis:6379/0
      - PYTHONUNBUFFERED=1
      - BRIDGE_SERVER_URL=http://backend:8001
      - BRIDGE_SERVER_URL_INTERNAL=http://backend:8001
      - IMPERSONATION_SECRET=${IMPERSONATION_SECRET:-${SUPABASE_SERVICE_ROLE_KEY}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      # FIX 7: esperar a que Redis esté realmente disponible antes de conectar el worker ARQ
      redis:
        condition: service_healthy
    networks:
      - ausarta-network

  redis:
    image: redis:alpine
    container_name: ausarta-redis
    restart: unless-stopped
    networks:
      - ausarta-network
    # FIX 7: AOF activo + snapshot cada 60 s si hay ≥1 cambio + noeviction para preservar colas ARQ
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD?REDIS_PASSWORD obligatoria - defínela en .env}
      --save 60 1
      --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    # FIX 7: healthcheck para que los servicios dependientes esperen a Redis real
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-${SUPABASE_URL}}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-${SUPABASE_KEY}}
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: ausarta-v2-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - ausarta-network
    depends_on:
      - backend
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ausarta-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
