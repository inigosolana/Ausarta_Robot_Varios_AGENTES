version: '3.8'

# Variables de entorno: crea `.env` en la raíz (cp .env.example .env).
# Docker Compose las carga automáticamente. Despliegue: ./scripts/deploy-compose.sh
x-app-environment: &app-environment
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_KEY: ${SUPABASE_KEY}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
  SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  LIVEKIT_URL: ${LIVEKIT_URL}
  LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
  LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
  SIP_OUTBOUND_TRUNK_ID: ${SIP_OUTBOUND_TRUNK_ID}
  DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
  CARTESIA_API_KEY: ${CARTESIA_API_KEY}
  GROQ_API_KEY: ${GROQ_API_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  N8N_WEBHOOK_BASE_URL: ${N8N_WEBHOOK_BASE_URL:-https://n8n.ausarta.net/webhook}
  N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
  N8N_PROXY_SECRET: ${N8N_PROXY_SECRET:-}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-${VITE_SUPABASE_ANON_KEY:-}}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM: ${SMTP_FROM:-instalaciones@ausarta.es}
  SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
  AUSARTA_API_KEY: ${AUSARTA_API_KEY:-}
  AUSARTA_API_KEY_LEGACY: ${AUSARTA_API_KEY_LEGACY:-false}
  AGENT_NAME_DISPATCH: ${AGENT_NAME_DISPATCH:-default_agent}
  ENABLE_RECORDING: ${ENABLE_RECORDING:-false}
  AGENTS_API_KEY: ${AGENTS_API_KEY:-}
  VOICE_ID_AUSARTA: ${VOICE_ID_AUSARTA:-}
  VOICE_ID_ESPANOL_F: ${VOICE_ID_ESPANOL_F:-}
  VOICE_ID_INES: ${VOICE_ID_INES:-}
  VOICE_ID_ALBA: ${VOICE_ID_ALBA:-}
  YEASTAR_HUMAN_TRANSFER_EXTENSION: ${YEASTAR_HUMAN_TRANSFER_EXTENSION:-1000}
  YEASTAR_WEBHOOK_SECRET: ${YEASTAR_WEBHOOK_SECRET:-}
  AUSARTA_PUBLIC_IP: ${AUSARTA_PUBLIC_IP:-}
  AUSARTA_PUBLIC_WEBHOOK_BASE_URL: ${AUSARTA_PUBLIC_WEBHOOK_BASE_URL:-${FRONTEND_URL:-}}
  FRONTEND_URL: ${FRONTEND_URL}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ausarta-v2-backend
    restart: unless-stopped
    ports:
      - "8003:8001"
    environment:
      <<: *app-environment
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      IMPERSONATION_SECRET: ${IMPERSONATION_SECRET}
      BRIDGE_SERVER_URL: ${BRIDGE_SERVER_URL:-http://localhost:8001}
      BRIDGE_SERVER_URL_INTERNAL: http://backend:8001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ausarta-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  livekit-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ausarta-livekit-agent
    restart: unless-stopped
    command: ["/agent_start.sh"]
    working_dir: /app
    environment:
      <<: *app-environment
      PYTHONUNBUFFERED: "1"
      BRIDGE_SERVER_URL: http://backend:8001
      BRIDGE_SERVER_URL_INTERNAL: http://backend:8001
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ausarta-network

  arq-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ausarta-arq-worker
    restart: unless-stopped
    command: ["arq", "worker.WorkerSettings"]
    working_dir: /app
    environment:
      <<: *app-environment
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      PYTHONUNBUFFERED: "1"
      BRIDGE_SERVER_URL: http://backend:8001
      BRIDGE_SERVER_URL_INTERNAL: http://backend:8001
      IMPERSONATION_SECRET: ${IMPERSONATION_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ausarta-network

  redis:
    image: redis:alpine
    container_name: ausarta-redis
    restart: unless-stopped
    networks:
      - ausarta-network
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-${SUPABASE_URL}}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-${SUPABASE_KEY}}
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_LIVEKIT_URL: ${VITE_LIVEKIT_URL:-${LIVEKIT_URL}}
        VITE_AUSARTA_PUBLIC_IP: ${VITE_AUSARTA_PUBLIC_IP:-${AUSARTA_PUBLIC_IP:-}}
    container_name: ausarta-v2-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - ausarta-network
    depends_on:
      - backend
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  dozzle:
    image: amir20/dozzle:latest
    container_name: ausarta-dozzle
    restart: unless-stopped
    # Visor centralizado de logs Docker. Solo expuesto en localhost del servidor.
    # Acceso recomendado: ssh -L 9999:127.0.0.1:9999 usuario@<servidor>
    ports:
      - "127.0.0.1:9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_NO_ANALYTICS: "true"
      DOZZLE_LEVEL: "info"
      DOZZLE_USERNAME: ${DOZZLE_USERNAME:-admin}
      DOZZLE_PASSWORD: ${DOZZLE_PASSWORD:?DOZZLE_PASSWORD es obligatorio. Defínelo en .env para proteger el visor de logs.}
      DOZZLE_KEY: ${DOZZLE_KEY:-}
    networks:
      - ausarta-network

networks:
  ausarta-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
