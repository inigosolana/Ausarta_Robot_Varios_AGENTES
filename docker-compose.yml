version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ausarta-v2-backend
    restart: unless-stopped
    ports:
      - "8003:8001"
    environment:
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - SIP_OUTBOUND_TRUNK_ID=${SIP_OUTBOUND_TRUNK_ID}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ELEVEN_API_KEY=${ELEVEN_API_KEY}
      - VOICE_ID_AUSARTA=${VOICE_ID_AUSARTA}
      - VOICE_ID_ESPANOLA=${VOICE_ID_ESPANOLA}
      - VOICE_ID_BUENA=${VOICE_ID_BUENA}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - GLPI_URL=${GLPI_URL}
      - GLPI_APP_TOKEN=${GLPI_APP_TOKEN}
      - GLPI_USER_TOKEN=${GLPI_USER_TOKEN}
      - N8N_WEBHOOK_URL_ALERTS=${N8N_WEBHOOK_URL_ALERTS}
      - AIRE_USER=${AIRE_USER}
      - AIRE_PASSWORD=${AIRE_PASSWORD}
      - LIVEKIT_ADMIN_USERNAME=${LIVEKIT_ADMIN_USERNAME}
      - LIVEKIT_ADMIN_PASSWORD=${LIVEKIT_ADMIN_PASSWORD}
      - ENABLE_SIP=${ENABLE_SIP}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_WEBHOOK_URL_ORCHESTRATOR=${N8N_WEBHOOK_URL_ORCHESTRATOR}
      - N8N_WEBHOOK_URL_TRANSCRIPTS=${N8N_WEBHOOK_URL_TRANSCRIPTS}
      - AGENT_NAME_DISPATCH=${AGENT_NAME_DISPATCH}
      - MAX_CONCURRENT_CALLS=${MAX_CONCURRENT_CALLS:-10}
      - CAMPAIGN_POLL_INTERVAL_SECONDS=${CAMPAIGN_POLL_INTERVAL_SECONDS:-30}
      - DRIP_COOLDOWN_MIN_SECONDS=${DRIP_COOLDOWN_MIN_SECONDS:-120}
      - DRIP_COOLDOWN_MAX_SECONDS=${DRIP_COOLDOWN_MAX_SECONDS:-180}
      - AGENT_CALL_TIMEOUT_SECONDS=${AGENT_CALL_TIMEOUT_SECONDS:-600}
      - BRIDGE_SERVER_URL=${BRIDGE_SERVER_URL:-http://localhost:8001}
      - AUSARTA_API_KEY=${AUSARTA_API_KEY:-}
      - SIP_TRANSFER_NUMBER=${SIP_TRANSFER_NUMBER:-}
      - AGENT_AMD_WINDOW_SECONDS=${AGENT_AMD_WINDOW_SECONDS:-15}
      - REDIS_URL=redis://redis:6379/0
      - ENABLE_RECORDING=${ENABLE_RECORDING:-false}
      - RECORDING_BUCKET=${RECORDING_BUCKET:-call-recordings}
      - SUPABASE_S3_ACCESS_KEY=${SUPABASE_S3_ACCESS_KEY:-}
      - SUPABASE_S3_SECRET_KEY=${SUPABASE_S3_SECRET_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    networks:
      - ausarta-network
    volumes:
      - sqlite-data:/app/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  arq-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ausarta-arq-worker
    restart: unless-stopped
    command: ["arq", "worker.WorkerSettings"]
    working_dir: /app
    environment:
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - SIP_OUTBOUND_TRUNK_ID=${SIP_OUTBOUND_TRUNK_ID}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ELEVEN_API_KEY=${ELEVEN_API_KEY}
      - VOICE_ID_AUSARTA=${VOICE_ID_AUSARTA}
      - VOICE_ID_ESPANOLA=${VOICE_ID_ESPANOLA}
      - VOICE_ID_BUENA=${VOICE_ID_BUENA}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - AGENT_NAME_DISPATCH=${AGENT_NAME_DISPATCH}
      - MAX_CONCURRENT_CALLS=${MAX_CONCURRENT_CALLS:-10}
      - CAMPAIGN_POLL_INTERVAL_SECONDS=${CAMPAIGN_POLL_INTERVAL_SECONDS:-30}
      - DRIP_COOLDOWN_MIN_SECONDS=${DRIP_COOLDOWN_MIN_SECONDS:-120}
      - DRIP_COOLDOWN_MAX_SECONDS=${DRIP_COOLDOWN_MAX_SECONDS:-180}
      - DRIP_ANSWER_TIMEOUT_SECONDS=${DRIP_ANSWER_TIMEOUT_SECONDS:-30}
      - DRIP_AGENT_JOIN_DELAY_SECONDS=${DRIP_AGENT_JOIN_DELAY_SECONDS:-3}
      - REDIS_URL=redis://redis:6379/0
      - ARQ_MAX_JOBS=${ARQ_MAX_JOBS:-10}
      - ARQ_JOB_TIMEOUT=${ARQ_JOB_TIMEOUT:-660}
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    networks:
      - ausarta-network

  redis:
    image: redis:alpine
    container_name: ausarta-redis
    restart: unless-stopped
    networks:
      - ausarta-network
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-${SUPABASE_URL}}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-${SUPABASE_KEY}}
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: ausarta-v2-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - ausarta-network
    depends_on:
      - backend
      - redis
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ausarta-network:
    driver: bridge

volumes:
  sqlite-data:
    driver: local
  redis-data:
    driver: local
