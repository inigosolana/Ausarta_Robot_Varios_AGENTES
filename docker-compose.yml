version: '3.8'

services:
  # Backend (API + LiveKit Agent)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ausarta-v2-backend
    restart: unless-stopped
    ports:
      - "8003:8001" # Puerto externo 8003 → interno 8001
    environment:
      # LiveKit
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}

      # SIP
      - SIP_OUTBOUND_TRUNK_ID=${SIP_OUTBOUND_TRUNK_ID}

      # AI Providers
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ELEVEN_API_KEY=${ELEVEN_API_KEY}
      - VOICE_ID_AUSARTA=${VOICE_ID_AUSARTA}
      - VOICE_ID_ESPANOLA=${VOICE_ID_ESPANOLA}

      # Database Configuration (Supabase)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

      # Integrations & Webhooks
      - GLPI_URL=${GLPI_URL}
      - GLPI_APP_TOKEN=${GLPI_APP_TOKEN}
      - GLPI_USER_TOKEN=${GLPI_USER_TOKEN}
      - N8N_WEBHOOK_URL_ALERTS=${N8N_WEBHOOK_URL_ALERTS}
      - AIRE_USER=${AIRE_USER}
      - AIRE_PASSWORD=${AIRE_PASSWORD}
      - LIVEKIT_ADMIN_USERNAME=${LIVEKIT_ADMIN_USERNAME}
      - LIVEKIT_ADMIN_PASSWORD=${LIVEKIT_ADMIN_PASSWORD}
      - ENABLE_SIP=${ENABLE_SIP}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_WEBHOOK_BASE_URL=${N8N_WEBHOOK_BASE_URL}

      # Bridge
      - BRIDGE_SERVER_URL=http://127.0.0.1:8001
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "livekit.ausarta.net:51.94.186.74"
    networks:
      - ausarta-network
    volumes:
      - sqlite-data:/app/data # Mantener por si acaso
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for scalability and WebSockets support
  redis:
    image: redis:alpine
    container_name: ausarta-redis
    restart: unless-stopped
    networks:
      - ausarta-network
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  # Frontend (React + Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-${SUPABASE_URL}}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-${SUPABASE_KEY}}
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: ausarta-v2-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - ausarta-network
    depends_on:
      - backend
      - redis
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: ausarta-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - ausarta-network

networks:
  ausarta-network:
    driver: bridge

volumes:
  sqlite-data:
    driver: local
  redis-data:
    driver: local
