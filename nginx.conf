server {
    listen 80;
    server_name _; # Cambiar por tu dominio real si es necesario

    # Desafío de Certbot (MANTENER SIEMPRE)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- MODO BOOTSTRAP (SOLO PUERTO 80) ---
    # Una vez tengas certificados, podré activar la redirección a HTTPS
    # y el bloque 443. Por ahora servimos la app aquí para que Nginx arranque.

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Proxy para el backend API
    location /api/ {
        proxy_pass http://backend:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy para los bridge endpoints
    location /iniciar-encuesta {
        proxy_pass http://backend:8001/iniciar-encuesta;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /guardar-encuesta {
        proxy_pass http://backend:8001/guardar-encuesta;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /colgar {
        proxy_pass http://backend:8001/colgar;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Cache para archivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    client_max_body_size 50M;
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript;
}

